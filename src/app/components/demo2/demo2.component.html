<div class="min-h-screen bg-gradient-to-br from-purple-50 to-pink-100 p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold text-gray-800 mb-2">Page Demo 2</h1>
    <p class="text-lg text-gray-600 mb-8">Bienvenue sur la deuxième page de démonstration</p>

    <!-- Card Material avec Tailwind -->
    <mat-card class="mb-6 shadow-lg hover:shadow-2xl transition-shadow">
      <mat-card-header class="bg-gradient-to-r from-purple-500 to-pink-600 p-4 text-white">
        <mat-card-title class="text-2xl">Page Secondaire</mat-card-title>
      </mat-card-header>

      <mat-card-content class="p-6">
        <p class="text-gray-700 mb-6">
          Vous êtes maintenant sur la page <strong>Demo 2</strong>. Utilisez le bouton ci-dessous
          pour revenir à la page d'accueil.
        </p>

        <!-- Bouton de retour -->
        <button 
          mat-raised-button 
          color="primary" 
          (click)="goBack()" 
          class="transition-all">
          <mat-icon>arrow_back</mat-icon>
          Retour à Demo
        </button>
      </mat-card-content>
    </mat-card>
  </div>
</div>
