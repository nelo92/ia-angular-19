<div class="min-h-screen bg-gradient-to-br from-purple-50 to-pink-100 p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold text-gray-800 mb-2">Demo 3 - Tailwind CSS + Flowbite</h1>
    <p class="text-lg text-gray-600 mb-8">Démonstration des boutons Tailwind et Flowbite</p>

    <!-- Section Boutons -->
    <div class="bg-white rounded-lg shadow-lg p-8">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6">Boutons de démonstration</h2>

      <div class="space-y-6">
        <!-- Bouton Tailwind CSS -->
        <div class="space-y-2">
          <h3 class="text-lg font-medium text-gray-700">Bouton Tailwind CSS</h3>
          <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors duration-200">
            Bouton Tailwind CSS
          </button>
        </div>

        <!-- Bouton Flowbite -->
        <div class="space-y-2">
          <h3 class="text-lg font-medium text-gray-700">Bouton Flowbite</h3>
          <button type="button" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800">
            Bouton Flowbite
          </button>
        </div>

        <!-- Bouton Flowbite avec icône -->
        <div class="space-y-2">
          <h3 class="text-lg font-medium text-gray-700">Bouton Flowbite avec icône</h3>
          <button type="button" class="text-white bg-gradient-to-r from-purple-500 to-pink-500 hover:bg-gradient-to-l focus:ring-4 focus:outline-none focus:ring-purple-200 dark:focus:ring-purple-800 font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2 mb-2">
            <svg class="w-4 h-4 me-2 inline" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 16">
              <path d="m10.036 8.278 9.258-7.79A1.979 1.979 0 0 0 18 0H2A1.987 1.987 0 0 0 .641.541l9.395 7.737Z"/>
              <path d="M11.241 9.817c-.36.275-.801.425-1.255.427-.428 0-.845-.138-1.187-.395L0 2.6V14a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V2.5l-8.759 7.317Z"/>
            </svg>
            Envoyer un email
          </button>
        </div>

        <!-- Bouton retour -->
        <div class="pt-4 border-t border-gray-200">
          <button type="button" (click)="goBack()" class="text-gray-900 bg-white border border-gray-300 focus:outline-none hover:bg-gray-100 focus:ring-4 focus:ring-gray-100 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:bg-gray-800 dark:text-white dark:border-gray-600 dark:hover:bg-gray-700 dark:hover:border-gray-600 dark:focus:ring-gray-700">
            Retour à Demo
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
